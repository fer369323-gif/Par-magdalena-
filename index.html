
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Magdalena</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #2d132c 0%, #170a16 70%, #000000 100%); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Arial'; animation: zoomSpace 10s infinite alternate ease-in-out; }
        @keyframes zoomSpace { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .floater { position: absolute; top: -10%; font-size: 24px; animation: floatDown 8s infinite linear; opacity: 0; pointer-events: none; }
        @keyframes floatDown { 0% { top: -10%; opacity: 1; transform: translateX(0) rotate(0); } 100% { top: 110%; opacity: 0; transform: translateX(50px) rotate(360deg); } }
        .text { text-align: center; z-index: 10; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        h1 { color: #ff85a2; font-size: 3.5em; text-shadow: 0 0 25px #ff1493; margin: 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        p { color: #fff; font-size: 1.4em; margin-top: 15px; font-style: italic; text-shadow: 1px 1px 5px #000; }
    </style>
</head>
<body>
    <script>
        const symbols = ['🌷', '💖', '✨', '🤍', '⭐', '🌷'];
        for (let i = 0; i < 60; i++) {
            let f = document.createElement('div');
            f.className = 'floater';
            f.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDelay = Math.random() * 8 + 's';
            f.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(f);
        }
    </script>
    <div class="text">
        <h1>Magdalena</h1>
        <p>Mi tulipán más hermoso y mi estrella favorita 🌷✨</p>
    </div>
</body>
</html>
