   
 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Magdalena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Arial'; perspective: 800px; }
        #stars-container { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #200520 0%, #000 100%); z-index: -1; }
        
        .floating-item {
            position: absolute;
            color: #ff85a2;
            white-space: nowrap;
            font-weight: bold;
            text-shadow: 0 0 15px #ff1493;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes tunnelEffect {
            0% { transform: translate3d(0,0,-1000px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate3d(var(--x), var(--y), 500px); opacity: 0; }
        }

        #overlay {
            position: fixed; z-index: 1000; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
            cursor: pointer; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h1 style="color: #ff85a2;">Para Magdalena ❤️</h1>
        <p>Toca la pantalla para activar la música y la magia</p>
        <span style="font-size: 50px;">🌷</span>
    </div>

    <div id="stars-container"></div>

    <audio id="musica" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/And-So-It-Begins-Inspired-By-Arrival.mp3" type="audio/mp3">
    </audio>

    <script>
        const words = ['🌷', 'Magdalena', 'Mi hermosa', 'Chula preciosa', 'Muy bonita', '🌷', 'Eres mi vida', '💖', 'Preciosa', '🌷', 'Mi niña', '✨'];

        function startExperience() {
            document.getElementById('musica').play();
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            setInterval(createFloatingElement, 150);
        }

        function createFloatingElement() {
            const el = document.createElement('div');
            el.className = 'floating-item';
            el.innerHTML = words[Math.floor(Math.random() * words.length)];
            
            // Ángulo aleatorio para que salgan hacia los lados como un túnel
            const angle = Math.random() * Math.PI * 2;
            const dist = 400 + Math.random() * 600;
            const x = Math.cos(angle) * dist;
            const y = Math.sin(angle) * dist;
            
            el.style.setProperty('--x', `${x}px`);
            el.style.setProperty('--y', `${y}px`);
            el.style.left = '50%';
            el.style.top = '50%';
            
            const size = Math.random() * 25 + 15;
            el.style.fontSize = `${size}px`;
            
            const duration = Math.random() * 3 + 3;
            el.style.animation = `tunnelEffect ${duration}s linear forwards`;
            
            document.body.appendChild(el);
            setTimeout(() => { el.remove(); }, duration * 1000);
        }
    </script>
</body>
</html>
